<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>貼圖裁切去背工具</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #ddeef8;
      color: #1a3a5c;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ══ Header ══ */
    header {
      background: #b3d4ec;
      padding: 8px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #90bcd8;
      flex-shrink: 0;
    }
    .app-icon {
      width: 32px; height: 32px;
      border-radius: 7px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .app-icon img { width: 100%; height: 100%; object-fit: cover; display: block; mix-blend-mode: multiply; }
    h1 { font-size: 16px; font-weight: 700; color: #0d2b45; }
    .subtitle { font-size: 11px; color: #4a7a9b; margin-top: 1px; }

    /* ══ Toolbar ══ */
    #toolbar {
      background: #c8e2f5;
      border-bottom: 1px solid #90bcd8;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .toolbar-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .toolbar-sep {
      width: 1px;
      height: 28px;
      background: #90bcd8;
      flex-shrink: 0;
    }
    .coord-field {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .coord-label {
      font-size: 11px;
      font-weight: 700;
      color: #2d6a8a;
      min-width: 14px;
    }
    .coord-input {
      background: #f0f8ff;
      border: 1px solid #90bcd8;
      color: #1a3a5c;
      padding: 5px 7px;
      border-radius: 6px;
      font-size: 13px;
      width: 72px;
    }
    .coord-input:focus { outline: none; border-color: #2980b9; }

    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .toggle-wrap span { font-size: 13px; color: #1a3a5c; }
    .toggle { position: relative; width: 40px; height: 21px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; inset: 0;
      background: #90bcd8;
      border-radius: 11px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 15px; height: 15px;
      left: 3px; top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle input:checked + .toggle-slider { background: #2980b9; }
    .toggle input:checked + .toggle-slider::before { transform: translateX(19px); }

    .btn-toolbar {
      padding: 6px 14px;
      border: 1px solid #90bcd8;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .btn-toolbar:disabled { opacity: 0.38; cursor: not-allowed; }
    .btn-tb-detect { background: #e8f4fb; color: #2980b9; }
    .btn-tb-detect:hover:not(:disabled) { background: #d0eaf7; }
    .btn-tb-reset  { background: #f0f8ff; color: #5a8aaa; }
    .btn-tb-reset:hover:not(:disabled)  { background: #ddeef8; }

    /* ══ Body row ══ */
    .body-row {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ══ Left action sidebar ══ */
    .action-bar {
      width: 120px;
      flex-shrink: 0;
      background: #c5e0f0;
      border-right: 1px solid #90bcd8;
      display: flex;
      flex-direction: column;
      padding: 12px 10px;
      gap: 8px;
    }
    .action-group-label {
      font-size: 10px;
      font-weight: 700;
      color: #2d6a8a;
      letter-spacing: .5px;
      padding: 2px 0;
    }
    .btn-action {
      width: 100%;
      padding: 9px 6px;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      text-align: center;
    }
    .btn-action:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-crop     { background: #27ae60; color: #fff; }
    .btn-crop:hover:not(:disabled)     { background: #1e9450; }
    .btn-next     { background: #2980b9; color: #fff; }
    .btn-next:hover:not(:disabled)     { background: #1a6a9a; }
    .btn-download { background: #1a7abf; color: #fff; }
    .btn-download:hover:not(:disabled) { background: #1260a0; }
    .btn-sep { height: 1px; background: #90bcd8; margin: 2px 0; }
    .btn-clear    { background: #fde8e8; color: #c0392b; border: 1px solid #f5c0c0; }
    .btn-clear:hover:not(:disabled)    { background: #fbd0d0; }
    .btn-reset-all { background: #ddeef8; color: #5a8aaa; border: 1px solid #b0cfe0; }
    .btn-reset-all:hover:not(:disabled) { background: #cce0f0; }

    /* ══ Canvas area ══ */
    .canvas-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      background: #ddeef8;
    }

    #dropzone {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      border: 2px dashed transparent;
      transition: border-color 0.2s, background 0.2s;
    }
    #dropzone.empty {
      border-color: #7ab8d8;
      border-radius: 12px;
      margin: 12px;
      width: calc(100% - 24px);
      height: calc(100% - 24px);
    }
    #dropzone.dragover {
      border-color: #2980b9;
      background: rgba(41,128,185,0.05);
    }

    .upload-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      color: #4a7a9b;
      pointer-events: none;
    }
    .upload-icon { font-size: 48px; opacity: 0.45; }
    .upload-text { font-size: 18px; color: #2980b9; font-weight: 600; }
    .upload-sub  { font-size: 12px; color: #5a90b0; }
    #choose-btn {
      background: #2980b9;
      color: #fff;
      border: none;
      padding: 9px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      pointer-events: auto;
      transition: background 0.2s;
    }
    #choose-btn:hover { background: #1a6a9a; }

    #canvas-wrapper {
      display: none;
      position: absolute;
      inset: 0;
      align-items: center;
      justify-content: center;
      overflow: auto;
    }
    #main-canvas { display: block; cursor: crosshair; }

    /* ══ Preview strip (bottom) ══ */
    #preview-strip {
      background: #b3d4ec;
      border-top: 1px solid #90bcd8;
      padding: 8px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      min-height: 90px;
    }
    .strip-label {
      font-size: 11px;
      font-weight: 700;
      color: #2d6a8a;
      white-space: nowrap;
      flex-shrink: 0;
      align-self: center;
    }
    .strip-scroll {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      flex: 1;
      align-items: center;
      padding-bottom: 2px;
    }
    .strip-scroll::-webkit-scrollbar { height: 4px; }
    .strip-scroll::-webkit-scrollbar-track { background: transparent; }
    .strip-scroll::-webkit-scrollbar-thumb { background: #90bcd8; border-radius: 2px; }

    .preview-thumb {
      width: 68px; height: 68px;
      flex-shrink: 0;
      background: #f0f8ff
        repeating-conic-gradient(#ddeef8 0% 25%, #f0f8ff 0% 50%)
        0 0 / 10px 10px;
      border-radius: 6px;
      overflow: hidden;
      position: relative;
      border: 1px solid #90bcd8;
      cursor: default;
    }
    .preview-thumb img { width: 100%; height: 100%; object-fit: contain; }
    .preview-thumb .del-btn {
      position: absolute;
      top: 2px; right: 2px;
      background: rgba(160,30,30,0.82);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 16px; height: 16px;
      font-size: 9px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }
    .preview-thumb:hover .del-btn { display: flex; }
    .preview-thumb .num-badge {
      position: absolute;
      bottom: 2px; left: 3px;
      font-size: 9px;
      color: rgba(0,0,0,0.45);
      font-weight: 700;
    }

    .strip-empty {
      color: #7aaac8;
      font-size: 12px;
      padding: 0 8px;
    }
    .strip-counter {
      margin-left: auto;
      flex-shrink: 0;
      background: #2980b9;
      color: #fff;
      padding: 5px 13px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    /* ══ Status bar ══ */
    #status-bar {
      background: #a8ccdf;
      padding: 4px 16px;
      font-size: 11px;
      color: #2d6a8a;
      border-top: 1px solid #80b0cc;
      display: flex;
      justify-content: space-between;
      flex-shrink: 0;
    }

    /* ══ Loading overlay ══ */
    #loading-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(190,225,245,0.85);
      z-index: 200;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
    #loading-overlay.show { display: flex; }
    .spinner {
      width: 46px; height: 46px;
      border: 4px solid #90bcd8;
      border-top-color: #2980b9;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: #0d2b45; font-size: 14px; font-weight: 600; }
  </style>
</head>
<body>

<!-- ══ Header ══ -->
<header>
  <div class="app-icon"><img src="../../logo/circular_icon_logo.png" alt="logo"></div>
  <div>
    <h1>貼圖裁切去背工具</h1>
    <div class="subtitle">上傳圖片 → 框選裁切 → 去背 → 下載 ZIP</div>
  </div>
</header>

<!-- ══ Toolbar ══ -->
<div id="toolbar">
  <div class="toolbar-group">
    <div class="coord-field">
      <span class="coord-label">X</span>
      <input type="number" class="coord-input" id="input-x" value="0" min="0">
    </div>
    <div class="coord-field">
      <span class="coord-label">Y</span>
      <input type="number" class="coord-input" id="input-y" value="0" min="0">
    </div>

      <span class="coord-label">寬</span>
      <input type="number" class="coord-input" id="input-w" value="100" min="1">
    </div>

      <span class="coord-label">高</span>
      <input type="number" class="coord-input" id="input-h" value="100" min="1">

  <div class="toolbar-sep"></div>

  <div class="toggle-wrap">
    <span>🪄 去背</span>
    <label class="toggle">

      <span class="toggle-slider"></span>
    </label>
  </div>

  <div class="toggle-wrap" id="tolerance-wrap" style="display:none">
    <span style="font-size:12px;color:#2d6a8a;">容差</span>
    <input type="range" id="tolerance-slider" min="5" max="120" value="30" style="width:72px;accent-color:#2980b9;">
    <span id="tolerance-val" style="font-size:12px;min-width:24px;color:#1a3a5c;">30</span>
  </div>

  <div class="toolbar-sep"></div>

  <button class="btn-toolbar btn-tb-detect" id="btn-auto" onclick="autoDetect()" disabled>✦ 自動偵測</button>
  <button class="btn-toolbar btn-tb-reset"               onclick="resetFrame()">↺ 重設框選</button>
</div>

<!-- ══ Body row ══ -->
<div class="body-row">

  <!-- Left action sidebar -->
  <div class="action-bar">
    <div class="action-group-label">裁切</div>
    <button class="btn-action btn-crop" id="btn-crop" onclick="cropAndAdd()" disabled>✂ 裁切<br>並加入</button>
    <button class="btn-action btn-next" id="btn-next" onclick="uploadNext()"  disabled>↑ 下一張</button>

    <div class="btn-sep"></div>

    <div class="action-group-label">匯出</div>
    <button class="btn-action btn-download" id="btn-download" onclick="downloadZip()" disabled>⬇ 下載<br>ZIP</button>

    <div class="btn-sep"></div>

    <button class="btn-action btn-clear"     onclick="clearStickers()">✕ 清空</button>
    <button class="btn-action btn-reset-all" onclick="resetAll()">↺ 重來</button>
  </div>

  <!-- Canvas area -->
  <div class="canvas-area">
    <div id="dropzone" class="empty">
      <div class="upload-placeholder" id="upload-placeholder">
        <div class="upload-icon">🖼️</div>
        <div class="upload-text">拖曳圖片到這裡</div>
        <div class="upload-sub">或點選下方按鈕匯入</div>
        <button id="choose-btn">選擇圖片</button>
      </div>
      <div id="canvas-wrapper">
        <canvas id="main-canvas"></canvas>
      </div>
    </div>
    <input type="file" id="file-input" accept="image/*" style="display:none">
  </div>

</div>

<!-- ══ Preview strip ══ -->
<div id="preview-strip">
  <div class="strip-label">已裁切預覽</div>
  <div class="strip-scroll" id="strip-scroll">
    <div class="strip-empty">尚未裁切任何圖片</div>
  </div>
  <div class="strip-counter" id="counter">0 / 32</div>
</div>

<!-- ══ Status bar ══ -->
<div id="status-bar">
  <span id="status-file">檔案：-</span>
  <span id="status-size">尺寸：-</span>
</div>

<!-- ══ Loading overlay ══ -->
<div id="loading-overlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loading-text">處理中，請稍候…</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>

<script type="module">
// ── 純 Canvas 去背（flood fill，不需外部函式庫）──
function removeBgCanvas(src, tolerance) {
  const oc = document.createElement('canvas');
  oc.width = src.width; oc.height = src.height;
  const octx = oc.getContext('2d');
  octx.drawImage(src, 0, 0);
  const img = octx.getImageData(0, 0, oc.width, oc.height);
  const data = img.data;
  const W = oc.width, H = oc.height;

  // 從四個角取樣背景色（取平均）
  function px(x, y) { const i=(y*W+x)*4; return [data[i],data[i+1],data[i+2],data[i+3]]; }
  const corners = [[0,0],[W-1,0],[0,H-1],[W-1,H-1]].map(([x,y])=>px(x,y));
  const bg = corners.reduce((a,c)=>[a[0]+c[0],a[1]+c[1],a[2]+c[2]],
    [0,0,0]).map(v=>v/corners.length);

  function diff(i) {
    return Math.abs(data[i]-bg[0]) + Math.abs(data[i+1]-bg[1]) + Math.abs(data[i+2]-bg[2]);
  }

  // BFS flood fill 從四邊出發
  const visited = new Uint8Array(W * H);
  const queue = [];
  for (let x=0;x<W;x++) { queue.push(x,0); queue.push(x,H-1); }
  for (let y=1;y<H-1;y++) { queue.push(0,y); queue.push(W-1,y); }

  let qi = 0;
  while (qi < queue.length) {
    const x = queue[qi++], y = queue[qi++];
    if (x<0||x>=W||y<0||y>=H) continue;
    const idx = y*W+x;
    if (visited[idx]) continue;
    visited[idx] = 1;
    const i = idx*4;
    if (data[i+3] < 10 || diff(i) <= tolerance) {
      data[i+3] = 0;
      queue.push(x-1,y, x+1,y, x,y-1, x,y+1);
    }
  }
  octx.putImageData(img, 0, 0);
  return oc;
}

// ── State ──
let imgEl    = null;
let scale    = 1;
let cropBox  = { x: 0, y: 0, w: 100, h: 100 };
let stickers = [];
const MAX = 32;
const HS  = 8;
const HIT = 10;

// ── DOM ──
const canvas      = document.getElementById('main-canvas');
const ctx         = canvas.getContext('2d');
const dropzone    = document.getElementById('dropzone');
const placeholder = document.getElementById('upload-placeholder');
const wrapper     = document.getElementById('canvas-wrapper');
const fileInput   = document.getElementById('file-input');
const counter     = document.getElementById('counter');
const btnCrop     = document.getElementById('btn-crop');
const btnAuto     = document.getElementById('btn-auto');
const btnNext     = document.getElementById('btn-next');
const btnDownload = document.getElementById('btn-download');
const inputX      = document.getElementById('input-x');
const inputY      = document.getElementById('input-y');
const inputW      = document.getElementById('input-w');
const inputH      = document.getElementById('input-h');
const bgToggle       = document.getElementById('bg-remove-toggle');
const toleranceWrap  = document.getElementById('tolerance-wrap');
const toleranceSlider= document.getElementById('tolerance-slider');
const toleranceVal   = document.getElementById('tolerance-val');
const loadingEl   = document.getElementById('loading-overlay');
const loadingTxt  = document.getElementById('loading-text');
const stripScroll = document.getElementById('strip-scroll');
const statusFile  = document.getElementById('status-file');
const statusSize  = document.getElementById('status-size');

// ── Expose handlers ──
window.autoDetect    = autoDetect;
window.cropAndAdd    = cropAndAdd;
window.uploadNext    = uploadNext;
window.resetFrame    = resetFrame;
window.downloadZip   = downloadZip;
window.clearStickers = clearStickers;
window.resetAll      = resetAll;

// ── 去背 toggle → 顯示/隱藏容差滑桿 ──
bgToggle.addEventListener('change', () => {
  toleranceWrap.style.display = bgToggle.checked ? 'flex' : 'none';
});
toleranceSlider.addEventListener('input', () => {
  toleranceVal.textContent = toleranceSlider.value;
});

// ── File input ──
document.getElementById('choose-btn').addEventListener('click', e => {
  e.stopPropagation();
  fileInput.click();
});
fileInput.addEventListener('change', e => {
  if (e.target.files[0]) loadImage(e.target.files[0]);
});

// ── Drag & drop ──
dropzone.addEventListener('dragover', e => {
  e.preventDefault();
  dropzone.classList.add('dragover');
});
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
dropzone.addEventListener('drop', e => {
  e.preventDefault();
  dropzone.classList.remove('dragover');
  const f = e.dataTransfer.files[0];
  if (f?.type.startsWith('image/')) loadImage(f);
});
dropzone.addEventListener('click', e => {
  if (!imgEl && e.target === dropzone) fileInput.click();
});

// ── Load image ──
function loadImage(file) {
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = () => {
    imgEl = img;

    const maxW = dropzone.clientWidth  - 8;
    const maxH = dropzone.clientHeight - 8;
    scale = Math.min(1, maxW / img.naturalWidth, maxH / img.naturalHeight);

    canvas.width  = Math.round(img.naturalWidth  * scale);
    canvas.height = Math.round(img.naturalHeight * scale);

    cropBox = { x: 0, y: 0, w: img.naturalWidth, h: img.naturalHeight };
    syncInputs();

    placeholder.style.display = 'none';
    wrapper.style.display     = 'flex';
    dropzone.classList.remove('empty');

    btnCrop.disabled = false;
    btnAuto.disabled = false;
    btnNext.disabled = false;

    statusFile.textContent = `檔案：${file.name}`;
    statusSize.textContent = `尺寸：${img.naturalWidth} × ${img.naturalHeight}`;

    draw();
    URL.revokeObjectURL(url);
  };
  img.src = url;
}

// ── Draw ──
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(imgEl, 0, 0, canvas.width, canvas.height);

  const sx = cropBox.x * scale, sy = cropBox.y * scale;
  const sw = cropBox.w * scale, sh = cropBox.h * scale;

  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(0,       0,            canvas.width, sy);
  ctx.fillRect(0,       sy,           sx,            sh);
  ctx.fillRect(sx + sw, sy,           canvas.width - sx - sw, sh);
  ctx.fillRect(0,       sy + sh,      canvas.width, canvas.height - sy - sh);

  ctx.strokeStyle = '#2980b9';
  ctx.lineWidth   = 1.5;
  ctx.setLineDash([]);
  ctx.strokeRect(sx, sy, sw, sh);

  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth   = 1;
  ctx.setLineDash([3, 3]);
  for (const t of [1/3, 2/3]) {
    ctx.beginPath(); ctx.moveTo(sx + sw*t, sy); ctx.lineTo(sx + sw*t, sy + sh); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(sx, sy + sh*t); ctx.lineTo(sx + sw, sy + sh*t); ctx.stroke();
  }
  ctx.setLineDash([]);

  ctx.fillStyle = '#2980b9';
  [ [sx, sy], [sx+sw, sy], [sx, sy+sh], [sx+sw, sy+sh],
    [sx+sw/2, sy], [sx+sw/2, sy+sh], [sx, sy+sh/2], [sx+sw, sy+sh/2] ]
    .forEach(([hx, hy]) => ctx.fillRect(hx - HS/2, hy - HS/2, HS, HS));
}

// ── Coordinate sync ──
function syncInputs() {
  inputX.value = Math.round(cropBox.x);
  inputY.value = Math.round(cropBox.y);
  inputW.value = Math.round(cropBox.w);
  inputH.value = Math.round(cropBox.h);
}
function syncFromInputs() {
  if (!imgEl) return;
  let x = parseInt(inputX.value) || 0;
  let y = parseInt(inputY.value) || 0;
  let w = Math.max(1, parseInt(inputW.value) || 1);
  let h = Math.max(1, parseInt(inputH.value) || 1);
  x = clamp(x, 0, imgEl.naturalWidth  - 1);
  y = clamp(y, 0, imgEl.naturalHeight - 1);
  w = clamp(w, 1, imgEl.naturalWidth  - x);
  h = clamp(h, 1, imgEl.naturalHeight - y);
  cropBox = { x, y, w, h };
  draw();
}
[inputX, inputY, inputW, inputH].forEach(el => el.addEventListener('input', syncFromInputs));

// ── Mouse drag ──
let dragMode = null, dragStart = null, boxStart = null;

function cpos(e) {
  const r = canvas.getBoundingClientRect();
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}
function clamp(v, lo, hi) { return Math.max(lo, Math.min(v, hi)); }

function hitTest(cx, cy) {
  const sx = cropBox.x * scale, sy = cropBox.y * scale;
  const sw = cropBox.w * scale, sh = cropBox.h * scale;
  const near = (ax, ay) => Math.abs(cx - ax) < HIT && Math.abs(cy - ay) < HIT;

  if (near(sx,      sy))      return 'tl';
  if (near(sx + sw, sy))      return 'tr';
  if (near(sx,      sy + sh)) return 'bl';
  if (near(sx + sw, sy + sh)) return 'br';
  if (near(sx+sw/2, sy))      return 'n';
  if (near(sx+sw/2, sy + sh)) return 's';
  if (near(sx,      sy+sh/2)) return 'w';
  if (near(sx + sw, sy+sh/2)) return 'e';
  if (cx > sx && cx < sx+sw && cy > sy && cy < sy+sh) return 'move';
  return 'new';
}
function cursorFor(m) {
  return { tl:'nwse-resize', tr:'nesw-resize', bl:'nesw-resize', br:'nwse-resize',
           n:'ns-resize', s:'ns-resize', e:'ew-resize', w:'ew-resize',
           move:'move', new:'crosshair' }[m] || 'crosshair';
}

canvas.addEventListener('mousemove', e => {
  if (!imgEl) return;
  const p = cpos(e);
  if (!dragMode) { canvas.style.cursor = cursorFor(hitTest(p.x, p.y)); return; }

  const dx = (p.x - dragStart.x) / scale;
  const dy = (p.y - dragStart.y) / scale;
  const { x, y, w, h } = boxStart;
  const iw = imgEl.naturalWidth, ih = imgEl.naturalHeight;

  if (dragMode === 'move') {
    cropBox = { x: clamp(x+dx, 0, iw-w), y: clamp(y+dy, 0, ih-h), w, h };
  } else if (dragMode === 'new') {
    const ox = dragStart.x / scale, oy = dragStart.y / scale;
    const nx = clamp(ox+dx, 0, iw), ny = clamp(oy+dy, 0, ih);
    cropBox = { x: Math.min(ox,nx), y: Math.min(oy,ny), w: Math.abs(nx-ox), h: Math.abs(ny-oy) };
  } else {
    let [nx, ny, nw, nh] = [x, y, w, h];
    if (dragMode === 'tl') { nx = clamp(x+dx,0,x+w-1); nw = w-(nx-x); ny = clamp(y+dy,0,y+h-1); nh = h-(ny-y); }
    if (dragMode === 'tr') { nw = clamp(w+dx,1,iw-x);  ny = clamp(y+dy,0,y+h-1); nh = h-(ny-y); }
    if (dragMode === 'bl') { nx = clamp(x+dx,0,x+w-1); nw = w-(nx-x); nh = clamp(h+dy,1,ih-y); }
    if (dragMode === 'br') { nw = clamp(w+dx,1,iw-x);  nh = clamp(h+dy,1,ih-y); }
    if (dragMode === 'n')  { ny = clamp(y+dy,0,y+h-1); nh = h-(ny-y); }
    if (dragMode === 's')  { nh = clamp(h+dy,1,ih-y); }
    if (dragMode === 'w')  { nx = clamp(x+dx,0,x+w-1); nw = w-(nx-x); }
    if (dragMode === 'e')  { nw = clamp(w+dx,1,iw-x); }
    cropBox = { x: nx, y: ny, w: nw, h: nh };
  }
  syncInputs();
  draw();
});

canvas.addEventListener('mousedown', e => {
  if (!imgEl) return;
  const p = cpos(e);
  dragMode = hitTest(p.x, p.y);
  dragStart = p;
  boxStart = { ...cropBox };
  e.preventDefault();
});

window.addEventListener('mouseup', () => {
  if (dragMode === 'new' && cropBox.w < 2 && cropBox.h < 2) resetFrame();
  dragMode = null;
});

// ── Auto detect ──
function autoDetect() {
  if (!imgEl) return;
  const oc = document.createElement('canvas');
  oc.width = imgEl.naturalWidth; oc.height = imgEl.naturalHeight;
  oc.getContext('2d').drawImage(imgEl, 0, 0);
  const data = oc.getContext('2d').getImageData(0, 0, oc.width, oc.height).data;
  const W = oc.width, H = oc.height;

  let x0 = W, x1 = 0, y0 = H, y1 = 0, found = false;
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const i = (y*W + x) * 4;
      const [r, g, b, a] = [data[i], data[i+1], data[i+2], data[i+3]];
      if (a < 12 || (r > 238 && g > 238 && b > 238)) continue;
      if (x < x0) x0 = x; if (x > x1) x1 = x;
      if (y < y0) y0 = y; if (y > y1) y1 = y;
      found = true;
    }
  }
  if (!found) { alert('偵測不到貼圖內容，請確認背景為白色或透明'); return; }

  const pad = 4;
  cropBox = {
    x: Math.max(0, x0 - pad),
    y: Math.max(0, y0 - pad),
    w: Math.min(W - Math.max(0, x0-pad), (x1-x0) + pad*2),
    h: Math.min(H - Math.max(0, y0-pad), (y1-y0) + pad*2),
  };
  syncInputs();
  draw();
}

// ── Crop & save ──
async function cropAndAdd() {
  if (!imgEl || stickers.length >= MAX) return;
  if (cropBox.w < 1 || cropBox.h < 1) { alert('請先框選裁切範圍'); return; }

  const oc = document.createElement('canvas');
  oc.width  = Math.round(cropBox.w);
  oc.height = Math.round(cropBox.h);
  oc.getContext('2d').drawImage(imgEl,
    cropBox.x, cropBox.y, cropBox.w, cropBox.h,
    0, 0, oc.width, oc.height);

  let blob;
  if (bgToggle.checked) {
    showLoading('去背處理中⋯');
    try {
      const tolerance = parseInt(toleranceSlider.value) || 30;
      const result = removeBgCanvas(oc, tolerance);
      blob = await new Promise(r => result.toBlob(r, 'image/png'));
    } catch (err) {
      hideLoading();
      alert('去背失敗：' + err.message);
      return;
    }
    hideLoading();
  } else {
    blob = await new Promise(r => oc.toBlob(r, 'image/png'));
  }

  stickers.push({ blob, url: URL.createObjectURL(blob) });
  refreshUI();
}

// ── Upload next ──
function uploadNext() { fileInput.value = ''; fileInput.click(); }

// ── Reset frame ──
function resetFrame() {
  if (!imgEl) return;
  cropBox = { x: 0, y: 0, w: imgEl.naturalWidth, h: imgEl.naturalHeight };
  syncInputs(); draw();
}

// ── Download ZIP ──
async function downloadZip() {
  if (stickers.length === 0) return;
  showLoading('打包 ZIP 中⋯');
  try {
    const zip = new JSZip();
    for (let i = 0; i < stickers.length; i++)
      zip.file(`sticker_${String(i+1).padStart(2,'0')}.png`, await stickers[i].blob.arrayBuffer());
    saveAs(await zip.generateAsync({ type: 'blob' }), 'stickers.zip');
  } catch (err) { alert('ZIP 下載失敗：' + err.message); }
  hideLoading();
}

// ── Clear stickers ──
function clearStickers() {
  if (stickers.length === 0) return;
  if (!confirm(`確定清空所有 ${stickers.length} 張貼圖？`)) return;
  stickers.forEach(s => URL.revokeObjectURL(s.url));
  stickers = [];
  refreshUI();
  if (imgEl) btnCrop.disabled = false;
}

// ── Reset all ──
function resetAll() {
  if (!confirm('確定全部重來？（目前圖片和所有裁切都會清除）')) return;
  stickers.forEach(s => URL.revokeObjectURL(s.url));
  stickers = []; imgEl = null;
  placeholder.style.display = 'flex';
  wrapper.style.display     = 'none';
  dropzone.classList.add('empty');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  btnCrop.disabled = btnAuto.disabled = btnNext.disabled = btnDownload.disabled = true;
  statusFile.textContent = '檔案：-';
  statusSize.textContent = '尺寸：-';
  fileInput.value = '';
  refreshUI();
}

// ── Refresh UI ──
function refreshUI() {
  counter.textContent  = `${stickers.length} / ${MAX}`;
  btnDownload.disabled = stickers.length === 0;
  if (imgEl) btnCrop.disabled = stickers.length >= MAX;

  stripScroll.innerHTML = '';
  if (stickers.length === 0) {
    stripScroll.innerHTML = '<div class="strip-empty">尚未裁切任何圖片</div>';
    return;
  }
  stickers.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'preview-thumb';

    const img = document.createElement('img');
    img.src = s.url;

    const badge = document.createElement('div');
    badge.className = 'num-badge';
    badge.textContent = i + 1;

    const del = document.createElement('button');
    del.className = 'del-btn';
    del.textContent = '✕';
    del.title = '刪除此張';
    del.onclick = () => {
      URL.revokeObjectURL(s.url);
      stickers.splice(i, 1);
      refreshUI();
      if (imgEl && stickers.length < MAX) btnCrop.disabled = false;
    };

    div.append(img, badge, del);
    stripScroll.appendChild(div);
  });
}

function showLoading(msg) { loadingTxt.textContent = msg; loadingEl.classList.add('show'); }
function hideLoading()    { loadingEl.classList.remove('show'); }

refreshUI();
</script>
